name: Auto Register

on:
  schedule:
    # Runs every hour at minute 0
    # We check if any rule's trigger time matches
    - cron: '0 * * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  register:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run registration check
        run: python scripts/check_and_register.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated classes
        run: |
          git config --local user.email "bot@autoarbox.local"
          git config --local user.name "AutoArbox Bot"
          git add data/classes.json
          git diff --staged --quiet || git commit -m "Update classes.json"
          git push
